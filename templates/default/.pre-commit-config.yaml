# guardrails — curated gate set, run by `prek` (pre-commit compatible). Tools come from the
# guardrails devShell (lib.mkDevShell), so `entry` commands are on PATH. Copy this into a consuming
# repo (or scaffold via `nix flake init -t github:gerchowl/guardrails`).
repos:
  - repo: local
    hooks:
      - id: no-fake-impl
        name: no fake/placeholder implementations
        entry: guardrails-no-fake-impl
        language: system
        pass_filenames: true
      - id: no-debug-leftovers
        name: no debug-print leftovers (use the tracing facade)
        entry: guardrails-no-debug-leftovers
        language: system
        pass_filenames: true
      - id: no-commented-code
        name: no commented-out code
        entry: guardrails-no-commented-code
        language: system
        pass_filenames: true
      - id: derived-docs
        name: derived docs match their source-of-truth command
        entry: guardrails-derived-docs
        language: system
        pass_filenames: true
      - id: no-conflict-markers
        name: no committed merge-conflict markers
        entry: guardrails-no-conflict-markers
        language: system
        pass_filenames: true
      - id: ci-shim
        name: CI is a shim over `nix flake check` (nudge)
        entry: guardrails-ci-shim
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true
      - id: gitleaks
        name: secrets scan
        entry: gitleaks protect --staged --redact -v
        language: system
        pass_filenames: false
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all -- --check
        language: system
        files: \.rs$
        pass_filenames: false
      - id: clippy
        name: clippy (-D warnings)
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-deny
        name: cargo-deny (licenses + advisories)
        entry: cargo deny check
        language: system
        files: Cargo\.(toml|lock)$
        pass_filenames: false
      # Numerical-obligation ratchet — wire as a pre-PUSH hook (CI-deep, not pre-commit):
      # the measurer runs separately and writes the measurement JSON files. Uncomment + add a
      # `numerical-obligation.toml` to enable. See templates/default/numerical-obligation.toml.
      # - id: numerical-obligation
      #   name: numerical obligations (parity errors / HARD counts / coverage % / ...)
      #   entry: guardrails-numerical-obligation
      #   language: system
      #   stages: [pre-push]
      #   pass_filenames: false
